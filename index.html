<body>
<div id="root"></div>

<script type="text/babel" src="primitives.jsx"></script>
<script type="text/babel" src="reveal.jsx"></script>
<script type="text/babel" src="chrome.jsx"></script>
<script type="text/babel" src="sections-a.jsx"></script>
<script type="text/babel" src="sections-b.jsx"></script>

<script type="text/babel">
function App() {
  const [selectedPackage, setSelectedPackage] = React.useState('');
  const formRef   = React.useRef(null);
  const pkgsRef   = React.useRef(null);

  const scrollToForm = (pkg) => {
    if (pkg) setSelectedPackage(pkg);
    if (formRef.current) formRef.current.scrollIntoView({ behavior:'smooth', block:'start' });
  };

  const scrollToPkgs = () => {
    if (pkgsRef.current) pkgsRef.current.scrollIntoView({ behavior:'smooth', block:'start' });
  };

  return (
    <>
      <RevealObserver />
      <Header onContactClick={() => scrollToForm()} />
      <main>
        <Hero onStartProject={() => scrollToForm()} onSeePackages={scrollToPkgs} />
        <div ref={pkgsRef}>
          <Packages onSelectPackage={scrollToForm} />
        </div>
        <Process />
        <WhyPi />
        <div ref={formRef}>
          <EnquiryForm selectedPackage={selectedPackage} />
        </div>
        <FAQ />
      </main>
      <Footer onContactClick={() => scrollToForm()} />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
